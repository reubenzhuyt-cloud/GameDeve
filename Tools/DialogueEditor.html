<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对话蓝图编辑器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft YaHei", "Segoe UI", sans-serif; background: #121520; color: #e8e8ec; height: 100vh; overflow: hidden; user-select: none; }
    .bar { height: 48px; background: #1a1f2e; border-bottom: 1px solid #2a3145; display: flex; align-items: center; justify-content: space-between; padding: 0 14px; flex-shrink: 0; }
    .bar h1 { font-size: 15px; font-weight: 600; color: #f07178; }
    .bar .actions { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    button { border: none; border-radius: 6px; padding: 7px 12px; font-size: 12px; cursor: pointer; background: #2a3145; color: #e8e8ec; }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-p { background: #c678dd; color: #fff; }
    .btn-g { background: #3d9970; color: #fff; }
    .btn-o { background: #e5a23a; color: #1a1a1a; }
    .btn-r { background: #c94c4c; color: #fff; }
    .main { display: flex; height: calc(100vh - 48px); }
    .side { width: 270px; background: #1a1f2e; border-right: 1px solid #2a3145; display: flex; flex-direction: column; min-width: 220px; }
    .side h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7289; padding: 10px 12px 6px; }
    .field { padding: 8px 12px; }
    .field label { display: block; font-size: 11px; color: #8b92a8; margin-bottom: 4px; }
    .field input[type="text"], .field input[type="number"], .field textarea, .field select {
      width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #2a3145; background: #121520; color: #e8e8ec; font-size: 13px;
    }
    .field textarea { min-height: 72px; resize: vertical; }
    .list { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
    .row { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 12px; }
    .nitem {
      padding: 8px 10px; border-radius: 8px; background: #121520; border: 1px solid #2a3145; margin-bottom: 6px; cursor: grab;
      font-size: 12px; display: flex; align-items: flex-start; gap: 8px;
    }
    .nitem:active { cursor: grabbing; }
    .nitem.on { border-color: #c678dd; background: #1e1a28; }
    .nitem .idx { font-family: ui-monospace, monospace; color: #5c9cf5; min-width: 2.2em; }
    .nitem .snippet { color: #8b92a8; font-size: 11px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #0d0f14; }
    .grid { position: absolute; inset: 0; background-image: radial-gradient(circle, #2a3145 1px, transparent 1px); background-size: 18px 18px; }
    .canvas { position: absolute; left: 0; top: 0; transform-origin: 0 0; }
    .edges { position: absolute; left: 0; top: 0; overflow: visible; pointer-events: none; z-index: 0; }
    .edges path { fill: none; stroke-width: 2; stroke-linecap: round; }
    .edges path.n { stroke: #3d9970; }
    .edges path.c { stroke: #c678dd; }
    .edges path.pre { stroke: #e5a23a; stroke-dasharray: 6 4; }
    .node {
      position: absolute; width: 200px; z-index: 1; background: #1a1f2e; border: 1px solid #2a3145; border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.35);
    }
    .node.sel { border-color: #c678dd; box-shadow: 0 0 0 2px rgba(198,120,221,.25); }
    .node .hd { padding: 8px 10px; border-radius: 10px 10px 0 0; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .node .hd.line { background: linear-gradient(90deg, #2d4a6f, #1a1f2e); }
    .node .hd.choice { background: linear-gradient(90deg, #5c3d6e, #1a1f2e); }
    .node .bd { padding: 8px 10px; font-size: 11px; color: #8b92a8; max-height: 52px; overflow: hidden; line-height: 1.35; }
    .ports { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 8px 10px; gap: 6px; }
    .port { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #6b7289; cursor: crosshair; pointer-events: auto; }
    .port i { width: 11px; height: 11px; border-radius: 50%; border: 2px solid; flex-shrink: 0; }
    .port.in i { border-color: #5c9cf5; background: #121520; }
    .port.out i { border-color: #3d9970; background: #121520; }
    .port.ch i { border-color: #c678dd; background: #121520; }
    .ins { width: 300px; background: #1a1f2e; border-left: 1px solid #2a3145; overflow-y: auto; padding: 12px; font-size: 13px; }
    .ins h2 { font-size: 12px; color: #8b92a8; margin-bottom: 10px; }
    .hint { font-size: 11px; color: #6b7289; line-height: 1.5; margin-bottom: 12px; padding: 8px; background: #121520; border-radius: 8px; border: 1px solid #2a3145; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 18px; background: #3d9970; color: #fff; border-radius: 8px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 99; }
    .toast.show { opacity: 1; }
    .toast.err { background: #c94c4c; }
    .zoom { position: absolute; top: 10px; right: 10px; font-size: 11px; color: #6b7289; background: rgba(26,31,46,.9); padding: 4px 8px; border-radius: 6px; }
    .stat { position: absolute; bottom: 10px; left: 10px; font-size: 11px; color: #6b7289; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; display: none; align-items: center; justify-content: center; }
    .modal-bg.on { display: flex; }
    .modal { background: #1a1f2e; border: 1px solid #2a3145; border-radius: 12px; padding: 16px 18px; max-width: 420px; width: calc(100% - 32px); box-shadow: 0 16px 48px rgba(0,0,0,.5); }
    .modal h3 { font-size: 14px; color: #f07178; margin-bottom: 8px; }
    .modal p.sub { font-size: 11px; color: #8b92a8; margin-bottom: 12px; line-height: 1.45; }
    .modal .opt { display: block; width: 100%; text-align: left; padding: 10px 12px; margin-bottom: 8px; border-radius: 8px; background: #121520; border: 1px solid #2a3145; color: #e8e8ec; cursor: pointer; font-size: 12px; }
    .modal .opt:hover { border-color: #5c9cf5; }
    .modal .opt.primary { border-color: #c678dd; background: #1e1a24; }
    .modal .opt .tag { color: #5c9cf5; font-family: ui-monospace, monospace; margin-right: 6px; }
    .modal .cancel { margin-top: 4px; background: transparent; color: #8b92a8; width: 100%; }
  </style>
</head>
<body>
  <div class="bar">
    <h1>对话蓝图 · Unity JsonUtility</h1>
    <div class="actions">
      <button type="button" id="btnNew">新建</button>
      <button type="button" id="btnOpen">打开 JSON</button>
      <button type="button" class="btn-p" id="btnSave">保存 JSON</button>
      <button type="button" class="btn-g" id="btnCopy">复制 JSON</button>
      <button type="button" id="btnUndo" disabled>撤销</button>
      <span style="width:8px"></span>
      <button type="button" class="btn-o" id="btnAddLine">+ 台词节点</button>
      <button type="button" class="btn-o" id="btnAddChoice">+ 分支节点</button>
      <button type="button" id="btnLayout">自动布局</button>
      <span style="width:8px"></span>
      <button type="button" id="btnVal">校验</button>
    </div>
  </div>
  <div class="main">
    <div class="side">
      <h2>工程</h2>
      <div class="field">
        <label>DialogueName</label>
        <input type="text" id="dlgName" placeholder="对话名称" />
      </div>
      <h2>节点顺序 = 数组下标</h2>
      <p class="field" style="font-size:11px;color:#8b92a8;line-height:1.45;padding-top:0;">
        Unity 从 <code style="color:#5c9cf5">nodes[0]</code> 开始。<br/>
        跳转字段 <code>nextNodeIndex</code> / <code>targetNodeIndex</code> 均为<strong>本列表中的下标</strong>。
      </p>
      <div class="row">
        <button type="button" id="btnDel" class="btn-r" disabled>删除选中</button>
      </div>
      <h2>节点列表（可拖动排序）</h2>
      <div class="list" id="nodeList"></div>
    </div>
    <div class="canvas-wrap" id="wrap">
      <div class="grid"></div>
      <div class="zoom" id="zoomLab">100%</div>
      <div class="stat" id="statLab"></div>
      <div class="canvas" id="canvas">
        <svg class="edges" id="edges"></svg>
      </div>
    </div>
    <div class="ins" id="inspector">
      <h2>属性</h2>
      <div class="hint">角色表与白云浦场景一致（玩家 / 渔夫 / 肉包子 / 佃户）。选好角色即视为「已填角色」，可作前序跳转。连线：从右侧圆点拖到左侧「入」；未命中时若在附近会自动吸附，否则弹出选择面板。</div>
      <div id="insBody"></div>
    </div>
  </div>
  <input type="file" id="fileIn" accept=".json,application/json" hidden />
  <div class="toast" id="toast"></div>
  <div class="modal-bg" id="modalBg" aria-hidden="true">
    <div class="modal" id="modalBox" role="dialog" aria-modal="true">
      <h3 id="modalTitle">选择连线目标</h3>
      <p class="sub" id="modalSub">未命中连接点。若附近无节点，请从下方选择；误操作可点取消。</p>
      <div id="modalOpts"></div>
      <button type="button" class="cancel" id="modalCancel">取消</button>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  /** @typedef {{ key: string, val: string }} Cond */
  /** @typedef {{ text: string, targetIndex: number, conditions: Cond[] }} ChoiceRow */
  /** @typedef {{ actorId: number, dialogueText: string, isChoiceNode: boolean, animationTrigger: string, nextIndex: number, choices: ChoiceRow[] | null, pos: {x:number,y:number}, actorSet?: boolean }} EdNode */

  const LS_KEY = 'dialogue_editor_v2';
  const SNAP = 16;

  /** 与 DialogueSystem 统一映射一致；导出 JSON 仍只写 actorId 数字 */
  const ACTOR_OPTIONS = [
    { id: 0, name: '孟忘' },
    { id: 1, name: '孟婆' },
    { id: 2, name: '无主之魂' },
    { id: 3, name: '渔夫' },
    { id: 4, name: '肉包子' },
    { id: 5, name: '佃户' },
  ];

  function actorLabel(actorId) {
    const o = ACTOR_OPTIONS.find((a) => a.id === actorId);
    return o ? o.name : '（未在表内 ID ' + actorId + '）';
  }

  function actorSelectHtml(selectedId) {
    let html = ACTOR_OPTIONS.map(
      (a) => `<option value="${a.id}"${selectedId === a.id ? ' selected' : ''}>${a.name}</option>`
    ).join('');
    if (!ACTOR_OPTIONS.some((a) => a.id === selectedId)) {
      html += `<option value="${selectedId}" selected>（未在表内）ID ${selectedId}</option>`;
    }
    return html;
  }

  const state = {
    name: 'NewDialogue',
    nodes: /** @type {EdNode[]} */ ([]),
    sel: -1,
    zoom: 1,
    panX: 0,
    panY: 0,
    connect: /** @type {null | { from: number, kind: 'line'|'choice', ci?: number }} */ (null),
    drag: /** @type {null | { i: number, ox: number, oy: number, px: number, py: number }} */ (null),
    pan: /** @type {null | { x: number, y: number }} */ (null),
    fileHandle: /** @type {FileSystemFileHandle | null} */ (null),
    undo: /** @type {string[]} */ ([]),
    undoMax: 80,
    listDrag: /** @type {null | { from: number }} */ (null),
    /** 弹窗选目标时暂存连线来源 */
    modalConnect: /** @type {null | { from: number, kind: 'line'|'choice', ci?: number, drop: {x:number,y:number} }} */ (null),
  };

  /** 视为「已填角色」：用户在属性里确认过 actor（用于前序节点列表） */
  function isActorFilled(n) {
    return !!n.actorSet;
  }

  /** 前序台词节点：下标小于 from、非分支、已填角色 */
  function priorLineNodesWithActor(from) {
    const out = [];
    for (let i = 0; i < from; i++) {
      const n = state.nodes[i];
      if (!n.isChoiceNode && isActorFilled(n)) out.push(i);
    }
    return out;
  }

  const $ = (id) => document.getElementById(id);
  const wrap = $('wrap');
  const canvas = $('canvas');
  const edges = $('edges');

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  }

  function toast(msg, err) {
    const t = $('toast');
    t.textContent = msg;
    t.className = 'toast show' + (err ? ' err' : '');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { t.className = 'toast'; }, 2400);
  }

  function snapshot() {
    return JSON.stringify({ name: state.name, nodes: state.nodes.map(n => ({ ...n, choices: n.choices ? n.choices.map(c => ({ ...c, conditions: (c.conditions || []).map(x => ({ ...x })) })) : null })) });
  }

  /** 在数据已变更后调用：把当前整图记入撤销栈（栈顶 = 当前状态） */
  function pushUndo() {
    const s = snapshot();
    if (state.undo.length && state.undo[state.undo.length - 1] === s) return;
    state.undo.push(s);
    if (state.undo.length > state.undoMax) state.undo.shift();
    $('btnUndo').disabled = state.undo.length <= 1;
  }

  function resetUndoStack() {
    state.undo = [snapshot()];
    $('btnUndo').disabled = true;
  }

  function applySnapshot(json) {
    try {
      const o = JSON.parse(json);
      state.name = o.name || 'NewDialogue';
      state.nodes = o.nodes || [];
      if (!state.nodes.length) state.sel = -1;
      else state.sel = Math.max(0, Math.min(state.sel, state.nodes.length - 1));
    } catch (e) {
      console.error(e);
    }
  }

  function undo() {
    if (state.undo.length <= 1) return;
    state.undo.pop();
    const prev = state.undo[state.undo.length - 1];
    applySnapshot(prev);
    renderAll();
    toast('已撤销');
  }

  /** 重映射引用：旧下标 -> 新下标 */
  function remapRefs(map) {
    const M = map;
    function r(ix) {
      if (ix < 0) return -1;
      const v = M[ix];
      return v === undefined ? -1 : v;
    }
    state.nodes.forEach(n => {
      if (!n.isChoiceNode) {
        n.nextIndex = r(n.nextIndex);
      } else if (n.choices) {
        n.choices.forEach(c => { c.targetIndex = r(c.targetIndex); });
      }
    });
  }

  /** 删除下标 del 后，压缩引用 */
  function remapAfterDelete(del) {
    state.nodes.forEach(n => {
      if (!n.isChoiceNode) {
        const t = n.nextIndex;
        if (t === del) n.nextIndex = -1;
        else if (t > del) n.nextIndex = t - 1;
      } else if (n.choices) {
        n.choices.forEach(c => {
          const t = c.targetIndex;
          if (t === del) c.targetIndex = -1;
          else if (t > del) c.targetIndex = t - 1;
        });
      }
    });
  }

  /**
   * 列表顺序变更：oldOrder 为原数组引用列表，newOrder 为新顺序的同一批对象
   */
  function reorderNodes(oldArr, newArr) {
    const oldToNew = new Array(oldArr.length);
    for (let oi = 0; oi < oldArr.length; oi++) {
      const obj = oldArr[oi];
      oldToNew[oi] = newArr.indexOf(obj);
    }
    state.nodes = newArr;
    remapRefs(oldToNew);
  }

  function defaultPos(i) {
    return { x: 80 + (i % 4) * 240, y: 80 + Math.floor(i / 4) * 140 };
  }

  function ensurePos() {
    state.nodes.forEach((n, i) => {
      if (!n.pos || typeof n.pos.x !== 'number') n.pos = defaultPos(i);
      if (n.actorSet === undefined) n.actorSet = false;
    });
  }

  /** 空工程时保证至少一个台词节点（入口 [0]） */
  function ensureFirstNode() {
    if (state.nodes.length > 0) return;
    state.nodes.push({
      actorId: 0,
      dialogueText: '',
      isChoiceNode: false,
      animationTrigger: '',
      nextIndex: -1,
      choices: null,
      actorSet: true,
      pos: defaultPos(0),
    });
    state.sel = 0;
  }

  /** 全图至少保留一个「台词」节点（可为空文本）；仅当只剩分支等时追加 */
  function ensureAtLeastOneLineNode() {
    if (state.nodes.some(n => !n.isChoiceNode)) return;
    const i = state.nodes.length;
    state.nodes.push({
      actorId: 0,
      dialogueText: '',
      isChoiceNode: false,
      animationTrigger: '',
      nextIndex: -1,
      choices: null,
      actorSet: false,
      pos: defaultPos(i),
    });
    if (state.sel < 0) state.sel = i;
  }

  function addLine() {
    const i = state.nodes.length;
    state.nodes.push({
      actorId: 0,
      dialogueText: '',
      isChoiceNode: false,
      animationTrigger: '',
      nextIndex: -1,
      choices: null,
      actorSet: false,
      pos: defaultPos(i),
    });
    state.sel = i;
    pushUndo();
    persist();
    renderAll();
  }

  function addChoice() {
    const i = state.nodes.length;
    state.nodes.push({
      actorId: 0,
      dialogueText: '',
      isChoiceNode: true,
      animationTrigger: '',
      nextIndex: -1,
      choices: [{ text: '选项 A', targetIndex: -1, conditions: [] }],
      actorSet: false,
      pos: defaultPos(i),
    });
    state.sel = i;
    pushUndo();
    persist();
    renderAll();
  }

  function deleteSel() {
    if (state.sel < 0 || state.sel >= state.nodes.length) return;
    state.nodes.splice(state.sel, 1);
    remapAfterDelete(state.sel);
    state.sel = state.nodes.length ? Math.min(state.sel, state.nodes.length - 1) : -1;
    ensureAtLeastOneLineNode();
    pushUndo();
    persist();
    renderAll();
  }

  /** ---------- Unity JSON ---------- */
  function fromUnityJson(obj) {
    if (!obj || !Array.isArray(obj.nodes)) throw new Error('无效 JSON：需要 nodes 数组');
    state.name = obj.DialogueName || obj.dialogueName || 'Dialogue';
    state.nodes = obj.nodes.map((raw, i) => {
      const isCh = !!raw.isChoiceNode;
      const ed = /** @type {EdNode} */ ({
        actorId: raw.actorId | 0,
        dialogueText: raw.dialogueText != null ? String(raw.dialogueText) : '',
        isChoiceNode: isCh,
        animationTrigger: raw.animationTrigger != null ? String(raw.animationTrigger) : '',
        nextIndex: isCh ? -1 : (typeof raw.nextNodeIndex === 'number' ? raw.nextNodeIndex : -1),
        choices: null,
        actorSet: true,
        pos: defaultPos(i),
      });
      if (isCh && Array.isArray(raw.choices)) {
        ed.choices = raw.choices.map(c => ({
          text: c.choiceText != null ? String(c.choiceText) : '',
          targetIndex: typeof c.targetNodeIndex === 'number' ? c.targetNodeIndex : -1,
          conditions: Array.isArray(c.conditions) ? c.conditions.map(x => ({ key: x.conditionKey != null ? String(x.conditionKey) : '', val: x.expectedValue != null ? String(x.expectedValue) : '' })) : [],
        }));
      }
      return ed;
    });
    ensurePos();
  }

  function toUnityJson() {
    return {
      DialogueName: state.name || 'Dialogue',
      nodes: state.nodes.map((n, i) => {
        const o = {
          nodeId: i,
          actorId: n.actorId | 0,
          dialogueText: n.dialogueText != null ? n.dialogueText : '',
          nextNodeIndex: n.isChoiceNode ? -1 : (n.nextIndex | 0),
          isChoiceNode: !!n.isChoiceNode,
          animationTrigger: n.animationTrigger != null ? n.animationTrigger : '',
        };
        if (n.isChoiceNode && n.choices && n.choices.length) {
          o.choices = n.choices.map(c => ({
            choiceText: c.text != null ? c.text : '',
            targetNodeIndex: typeof c.targetIndex === 'number' ? c.targetIndex : -1,
            conditions: (c.conditions || []).map(x => ({ conditionKey: x.key || '', expectedValue: x.val || '' })),
          }));
        }
        return o;
      }),
    };
  }

  function validate() {
    const n = state.nodes.length;
    const bad = [];
    if (n === 0) bad.push('nodes 为空');
    state.nodes.forEach((node, i) => {
      if (!node.isChoiceNode) {
        const t = node.nextIndex;
        if (t !== -1 && (t < 0 || t >= n || t === i)) bad.push(`[${i}] nextIndex=${t} 非法`);
      } else {
        if (!node.choices || node.choices.length === 0) bad.push(`[${i}] 分支节点无选项`);
        (node.choices || []).forEach((c, k) => {
          const t = c.targetIndex;
          if (t !== -1 && (t < 0 || t >= n || t === i)) bad.push(`[${i}] 选项${k + 1} target=${t} 非法`);
        });
      }
    });
    return bad;
  }

  function persist() {
    try {
      localStorage.setItem(LS_KEY, snapshot());
    } catch (e) { /* ignore */ }
  }

  /** ---------- 画布 ---------- */
  function updateTransform() {
    canvas.style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.zoom})`;
    $('zoomLab').textContent = Math.round(state.zoom * 100) + '%';
    const bad = validate();
    $('statLab').textContent = bad.length ? ('校验: ' + bad.slice(0, 2).join('；')) : ('节点 ' + state.nodes.length + ' · 入口 [0]');
  }

  /**
   * 视口坐标 → 画布内坐标（与 node.pos、SVG 连线一致）。
   * #canvas 为 translate(panX, panY) scale(zoom)，origin 0 0，且左上角对齐 #wrap 内容区原点。
   */
  function clientToCanvasLocal(clientX, clientY) {
    const r = wrap.getBoundingClientRect();
    const x = (clientX - r.left - state.panX) / state.zoom;
    const y = (clientY - r.top - state.panY) / state.zoom;
    return { x, y };
  }

  function bezier(x1, y1, x2, y2) {
    const dx = Math.max(48, Math.abs(x2 - x1) * 0.45);
    return `M${x1},${y1} C${x1 + dx},${y1} ${x2 - dx},${y2} ${x2},${y2}`;
  }

  function snapPos(x, y) {
    return {
      x: Math.round(x / SNAP) * SNAP,
      y: Math.round(y / SNAP) * SNAP,
    };
  }

  /** 屏幕坐标下查找最近的「入」端口，在 maxPx 内则视为吸附连接 */
  function findNearestInputPort(clientX, clientY, maxPx) {
    let best = /** @type {null | { idx: number, d: number }} */ (null);
    canvas.querySelectorAll('.port-in').forEach((el) => {
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const d = Math.hypot(clientX - cx, clientY - cy);
      const idx = +el.dataset.to;
      if (d <= maxPx && (!best || d < best.d)) best = { idx, d };
    });
    return best ? best.idx : -1;
  }

  function applyWire(conn, toIdx) {
    const from = conn.from;
    if (toIdx < 0 || toIdx >= state.nodes.length || toIdx === from) return;
    if (conn.kind === 'line') {
      if (state.nodes[from].isChoiceNode) return;
      state.nodes[from].nextIndex = toIdx;
    } else if (conn.kind === 'choice' && conn.ci != null) {
      if (!state.nodes[from].isChoiceNode) return;
      const ch = state.nodes[from].choices;
      if (ch && ch[conn.ci]) ch[conn.ci].targetIndex = toIdx;
    }
    pushUndo();
    persist();
  }

  function createChoiceAndWire(conn, pos) {
    const fromNode = state.nodes[conn.from];
    if (!fromNode) return;
    const p = snapPos(pos.x, pos.y);
    const newIdx = state.nodes.length;
    state.nodes.push({
      actorId: 0,
      dialogueText: '',
      isChoiceNode: true,
      animationTrigger: '',
      nextIndex: -1,
      choices: [{ text: '选项 A', targetIndex: -1, conditions: [] }],
      actorSet: false,
      pos: { x: p.x, y: p.y },
    });
    if (conn.kind === 'line') {
      state.nodes[conn.from].nextIndex = newIdx;
    } else if (conn.kind === 'choice' && conn.ci != null) {
      const ch = state.nodes[conn.from].choices;
      if (ch && ch[conn.ci]) ch[conn.ci].targetIndex = newIdx;
    }
    state.sel = newIdx;
    pushUndo();
    persist();
    toast('已新建选择并连接');
  }

  function createDialogueAndWire(conn, pos, actorId) {
    const fromNode = state.nodes[conn.from];
    if (!fromNode) return;
    const p = snapPos(pos.x, pos.y);
    const newIdx = state.nodes.length;
    state.nodes.push({
      actorId: actorId,
      dialogueText: '',
      isChoiceNode: false,
      animationTrigger: '',
      nextIndex: -1,
      choices: null,
      actorSet: true,
      pos: { x: p.x, y: p.y },
    });
    if (conn.kind === 'line') {
      state.nodes[conn.from].nextIndex = newIdx;
    } else if (conn.kind === 'choice' && conn.ci != null) {
      const ch = state.nodes[conn.from].choices;
      if (ch && ch[conn.ci]) ch[conn.ci].targetIndex = newIdx;
    }
    state.sel = newIdx;
    pushUndo();
    persist();
    toast('已新建对话并连接');
  }

  function openConnectTargetModal(conn, clientX, clientY) {
    const p0 = clientToCanvasLocal(clientX, clientY);
    const drop = snapPos(p0.x, p0.y);

    const priorRoles = Array.from(
      new Set(
        priorLineNodesWithActor(conn.from).map((idx) => state.nodes[idx].actorId)
      )
    );
    const defaultActorId = 0;
    let selectedActorId = priorRoles.length ? priorRoles[0] : defaultActorId;

    state.modalConnect = { ...conn, drop };

    const opts = $('modalOpts');
    opts.innerHTML = '';

    const b1 = document.createElement('button');
    b1.type = 'button';
    b1.className = 'opt primary';
    b1.innerHTML = '<span class="tag">1.</span> 选择';
    b1.onclick = () => {
      closeConnectModal();
      createChoiceAndWire(conn, drop);
      renderAll();
    };
    opts.appendChild(b1);

    const b2 = document.createElement('button');
    b2.type = 'button';
    b2.className = 'opt';
    b2.innerHTML = '<span class="tag">2.</span> 对话';
    b2.onclick = () => {
      closeConnectModal();
      createDialogueAndWire(conn, drop, priorRoles.length ? selectedActorId : defaultActorId);
      renderAll();
    };
    opts.appendChild(b2);

    if (priorRoles.length) {
      const wrapSel = document.createElement('div');
      wrapSel.style.margin = '6px 0 10px';
      wrapSel.innerHTML = `
        <label style="display:block;font-size:11px;color:#8b92a8;margin-bottom:4px;">对话角色分类（前序已出现）</label>
        <select id="modalActorSelect" style="width:100%;padding:8px;border-radius:6px;border:1px solid #2a3145;background:#121520;color:#e8e8ec;font-size:12px;">
          ${priorRoles.map((actorId) => `<option value="${actorId}">${escapeHtml(actorLabel(actorId))}</option>`).join('')}
        </select>`;
      opts.appendChild(wrapSel);
      const sel = wrapSel.querySelector('#modalActorSelect');
      sel.onchange = () => {
        selectedActorId = +sel.value;
        createDialogueBtn.innerHTML = `<span class="tag">2.1</span> 创建对话（${escapeHtml(actorLabel(selectedActorId))}）`;
      };
    }

    const createDialogueBtn = document.createElement('button');
    createDialogueBtn.type = 'button';
    createDialogueBtn.className = 'opt primary';
    createDialogueBtn.style.marginTop = priorRoles.length ? '0' : '8px';
    createDialogueBtn.innerHTML = priorRoles.length
      ? `<span class="tag">2.1</span> 创建对话（${escapeHtml(actorLabel(selectedActorId))}）`
      : `<span class="tag">2.1</span> 创建默认对话（${escapeHtml(actorLabel(defaultActorId))}）`;
    createDialogueBtn.onclick = () => {
      closeConnectModal();
      createDialogueAndWire(conn, drop, priorRoles.length ? selectedActorId : defaultActorId);
      renderAll();
    };
    opts.appendChild(createDialogueBtn);

    if (!priorRoles.length) {
      const tip = document.createElement('p');
      tip.className = 'sub';
      tip.style.marginTop = '6px';
      tip.textContent = '暂无前序角色分类，已按默认角色创建。';
      opts.appendChild(tip);
    }

    $('modalBg').classList.add('on');
    $('modalBg').setAttribute('aria-hidden', 'false');
  }

  function closeConnectModal() {
    $('modalBg').classList.remove('on');
    $('modalBg').setAttribute('aria-hidden', 'true');
    state.modalConnect = null;
  }

  function portCenter(nodeEl, sel) {
    const el = nodeEl.querySelector(sel);
    if (!el) return { x: 0, y: 0 };
    const r1 = el.getBoundingClientRect();
    return clientToCanvasLocal(r1.left + r1.width / 2, r1.top + r1.height / 2);
  }

  function drawEdges(preview) {
    const paths = [];
    state.nodes.forEach((node, i) => {
      const nel = canvas.querySelector(`.node[data-i="${i}"]`);
      if (!nel) return;
      if (!node.isChoiceNode) {
        const t = node.nextIndex;
        if (t >= 0 && t < state.nodes.length) {
          const el2 = canvas.querySelector(`.node[data-i="${t}"]`);
          if (el2) {
            const a = portCenter(nel, '.port-out');
            const b = portCenter(el2, '.port-in');
            paths.push(`<path class="n" d="${bezier(a.x, a.y, b.x, b.y)}"/>`);
          }
        }
      } else if (node.choices) {
        node.choices.forEach((c, ci) => {
          const t = c.targetIndex;
          if (t < 0 || t >= state.nodes.length) return;
          const el2 = canvas.querySelector(`.node[data-i="${t}"]`);
          if (!el2) return;
          const a = portCenter(nel, `.port-ch[data-ci="${ci}"]`);
          const b = portCenter(el2, '.port-in');
          paths.push(`<path class="c" d="${bezier(a.x, a.y, b.x, b.y)}"/>`);
        });
      }
    });
    if (preview) {
      const a = portCenter(preview.el, preview.outSel);
      paths.push(`<path class="pre" d="${bezier(a.x, a.y, preview.x, preview.y)}"/>`);
    }
    edges.innerHTML = paths.join('');
    const vb = 4000;
    edges.setAttribute('viewBox', `0 0 ${vb} ${vb}`);
    edges.style.width = vb + 'px';
    edges.style.height = vb + 'px';
  }

  function renderNodes() {
    const frag = document.createDocumentFragment();
    state.nodes.forEach((node, i) => {
      const div = document.createElement('div');
      div.className = 'node' + (state.sel === i ? ' sel' : '');
      div.dataset.i = String(i);
      div.style.left = node.pos.x + 'px';
      div.style.top = node.pos.y + 'px';
      const hd = node.isChoiceNode ? 'choice' : 'line';
      const title = node.isChoiceNode ? `分支 [${i}]` : `台词 [${i}]`;
      let outs = '';
      if (node.isChoiceNode && node.choices) {
        node.choices.forEach((c, ci) => {
          outs += `<span class="port port-ch" data-ci="${ci}" title="拖到目标"><i></i>${(c.text || '选项').slice(0, 8)}</span>`;
        });
      } else {
        outs = `<span class="port port-out" title="下一节点"><i></i>下一</span>`;
      }
      div.innerHTML = `
        <div class="hd ${hd}">${title}<span style="margin-left:auto;font-size:10px;color:#6b7289;">${escapeHtml(actorLabel(node.actorId))}</span></div>
        <div class="bd">${escapeHtml((node.dialogueText || '（空）').slice(0, 120))}</div>
        <div class="ports">
          <span class="port port-in" data-to="${i}" title="连入"><i></i>入</span>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">${outs}</div>
        </div>`;
      frag.appendChild(div);
    });
    while (canvas.firstChild) canvas.removeChild(canvas.firstChild);
    canvas.appendChild(edges);
    canvas.appendChild(frag);
    requestAnimationFrame(() => drawEdges(null));
  }

  function renderList() {
    const list = $('nodeList');
    list.innerHTML = state.nodes.map((n, i) => `
      <div class="nitem${state.sel === i ? ' on' : ''}" data-i="${i}" draggable="true">
        <span class="idx">[${i}]</span>
        <div style="flex:1;min-width:0;">
          <div>${n.isChoiceNode ? '分支' : '台词'} · ${escapeHtml(actorLabel(n.actorId))}</div>
          <div class="snippet">${escapeHtml((n.dialogueText || '').slice(0, 40))}</div>
        </div>
      </div>`).join('');
    list.querySelectorAll('.nitem').forEach(el => {
      el.addEventListener('click', () => { state.sel = +el.dataset.i; renderAll(); });
      el.addEventListener('dragstart', (e) => {
        state.listDrag = { from: +el.dataset.i };
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
      el.addEventListener('drop', (e) => {
        e.preventDefault();
        const from = state.listDrag && state.listDrag.from;
        const to = +el.dataset.i;
        state.listDrag = null;
        if (from === undefined || from === to) return;
        const old = state.nodes.slice();
        const moved = old[from];
        const copy = old.slice();
        copy.splice(from, 1);
        copy.splice(to, 0, moved);
        reorderNodes(state.nodes, copy);
        state.sel = state.nodes.indexOf(moved);
        pushUndo();
        persist();
        renderAll();
        toast('已重排节点并更新所有跳转下标');
      });
    });
  }

  function renderInspector() {
    const box = $('insBody');
    if (state.sel < 0 || state.sel >= state.nodes.length) {
      box.innerHTML = '<p style="color:#6b7289;font-size:12px;">未选中节点</p>';
      return;
    }
    const n = state.nodes[state.sel];
    const i = state.sel;
    let html = `
      <div class="field"><label>角色（对应 Unity 内 actorId，保存为数字）</label>
        <select id="fActor">${actorSelectHtml(n.actorId)}</select></div>
      <div class="field"><label>台词 dialogueText</label>
        <textarea id="fText"></textarea></div>
      <div class="field"><label>animationTrigger</label>
        <input type="text" id="fAnim" /></div>`;
    if (!n.isChoiceNode) {
      html += `<div class="field"><label>下一节点 nextIndex（数组下标，-1 结束）</label>
        <select id="fNext">` + nextOptions(i, n.nextIndex) + `</select></div>`;
    } else {
      html += `<div class="field"><label>分支选项</label>
        <div id="chBox"></div>
        <button type="button" class="btn-g" id="btnAddCh" style="margin-top:8px;width:100%">+ 添加选项</button></div>`;
    }
    box.innerHTML = html;
    $('fText').value = n.dialogueText || '';
    $('fAnim').value = n.animationTrigger || '';

    $('fActor').onchange = () => {
      n.actorId = +$('fActor').value | 0;
      n.actorSet = true;
      persist();
      renderNodes();
      renderList();
    };
    $('fText').oninput = () => { n.dialogueText = $('fText').value; persist(); renderNodes(); renderList(); };
    $('fAnim').oninput = () => { n.animationTrigger = $('fAnim').value; persist(); };

    if (!n.isChoiceNode) {
      $('fNext').onchange = () => {
        n.nextIndex = +$('fNext').value;
        pushUndo();
        persist();
        renderNodes();
        drawEdges(null);
      };
    } else {
      renderChoiceEditor(n);
      $('btnAddCh').onclick = () => {
        n.choices = n.choices || [];
        n.choices.push({ text: '新选项', targetIndex: -1, conditions: [] });
        pushUndo();
        persist();
        renderAll();
      };
    }
  }

  function nextOptions(selfIdx, cur) {
    let o = `<option value="-1" ${cur === -1 ? 'selected' : ''}>−1 结束对话</option>`;
    state.nodes.forEach((_, j) => {
      if (j === selfIdx) return;
      o += `<option value="${j}" ${cur === j ? 'selected' : ''}>[${j}]</option>`;
    });
    return o;
  }

  function targetOptions(selfIdx, cur) {
    return nextOptions(selfIdx, cur);
  }

  function renderChoiceEditor(n) {
    const chBox = $('chBox');
    if (!n.choices) n.choices = [];
    chBox.innerHTML = n.choices.map((c, ci) => `
      <div style="border:1px solid #2a3145;border-radius:8px;padding:8px;margin-bottom:8px;background:#121520;">
        <div class="field"><label>选项 ${ci + 1} 文本</label>
          <input type="text" class="ch-txt" data-ci="${ci}" /></div>
        <div class="field"><label>目标下标 targetNodeIndex</label>
          <select class="ch-tgt" data-ci="${ci}">${targetOptions(state.sel, c.targetIndex)}</select></div>
        <button type="button" class="btn-r ch-del" data-ci="${ci}" style="width:100%">删除此选项</button>
      </div>`).join('');

    chBox.querySelectorAll('.ch-txt').forEach(inp => {
      const ci = +inp.dataset.ci;
      inp.value = n.choices[ci].text || '';
      inp.oninput = () => {
        const cix = +inp.dataset.ci;
        n.choices[cix].text = inp.value;
        persist();
        renderNodes();
        renderList();
      };
    });
    chBox.querySelectorAll('.ch-tgt').forEach(sel => {
      sel.onchange = () => {
        const ci = +sel.dataset.ci;
        n.choices[ci].targetIndex = +sel.value;
        pushUndo();
        persist();
        renderNodes();
        drawEdges(null);
      };
    });
    chBox.querySelectorAll('.ch-del').forEach(btn => {
      btn.onclick = () => {
        const ci = +btn.dataset.ci;
        if (n.choices.length <= 1) { toast('至少保留一个选项', true); return; }
        n.choices.splice(ci, 1);
        pushUndo();
        persist();
        renderAll();
      };
    });
  }

  function renderAll() {
    $('dlgName').value = state.name;
    $('btnDel').disabled = state.sel < 0;
    $('btnUndo').disabled = state.undo.length <= 1;
    ensurePos();
    renderNodes();
    renderList();
    renderInspector();
    updateTransform();
  }

  function autoLayout() {
    if (!state.nodes.length) return;
    state.nodes.forEach((n, i) => {
      n.pos = defaultPos(i);
    });
    pushUndo();
    persist();
    renderAll();
    toast('已布局');
  }

  /** ---------- 交互 ---------- */
  wrap.addEventListener('mousedown', (e) => {
    // Left mouse button only for canvas interactions.
    if (e.button !== 0) return;

    // If a modal is open, prevent hidden-state interference with drag/connection.
    if ($('modalBg').classList.contains('on')) {
      closeConnectModal();
    }

    const t = /** @type {HTMLElement} */ (e.target);
    const nodeEl = t.closest('.node');
    const pr = t.closest('.port-out, .port-ch');
    const pin = t.closest('.port-in');

    if (pr && nodeEl) {
      const from = +nodeEl.dataset.i;
      const isCh = pr.classList.contains('port-ch');
      state.connect = isCh ? { from, kind: 'choice', ci: +pr.dataset.ci } : { from, kind: 'line' };
      e.preventDefault();
      return;
    }
    if (nodeEl) {
      // Starting node drag should cancel any stale connection preview state.
      state.connect = null;
      const i = +nodeEl.dataset.i;
      state.sel = i;
      const n = state.nodes[i];
      state.drag = { i, ox: n.pos.x, oy: n.pos.y, px: e.clientX, py: e.clientY };
      e.preventDefault();
      return;
    }
    // Left-click blank area: pan canvas.
    if (!nodeEl && !pr && !pin) {
      state.pan = { x: e.clientX, y: e.clientY };
      state.sel = -1;
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (state.drag) {
      const d = state.drag;
      const n = state.nodes[d.i];
      n.pos.x = d.ox + (e.clientX - d.px) / state.zoom;
      n.pos.y = d.oy + (e.clientY - d.py) / state.zoom;
      n.pos.x = Math.round(n.pos.x / SNAP) * SNAP;
      n.pos.y = Math.round(n.pos.y / SNAP) * SNAP;
      const el = canvas.querySelector(`.node[data-i="${d.i}"]`);
      if (el) { el.style.left = n.pos.x + 'px'; el.style.top = n.pos.y + 'px'; }
      drawEdges(null);
      return;
    }
    if (state.pan) {
      state.panX += e.clientX - state.pan.x;
      state.panY += e.clientY - state.pan.y;
      state.pan = { x: e.clientX, y: e.clientY };
      updateTransform();
      drawEdges(null);
      return;
    }
    if (state.connect) {
      const nel = canvas.querySelector(`.node[data-i="${state.connect.from}"]`);
      const outSel = state.connect.kind === 'line' ? '.port-out' : `.port-ch[data-ci="${state.connect.ci}"]`;
      const { x, y } = clientToCanvasLocal(e.clientX, e.clientY);
      drawEdges({ el: nel, outSel, x, y });
    }
  });

  window.addEventListener('mouseup', (e) => {
    if (state.drag) {
      const d = state.drag;
      const n = state.nodes[d.i];
      if (n.pos.x !== d.ox || n.pos.y !== d.oy) pushUndo();
      persist();
      state.drag = null;
    }
    if (state.pan) state.pan = null;

    if (state.connect) {
      const conn = state.connect;
      const t = /** @type {HTMLElement} */ (e.target);
      const pin = t.closest('.port-in');
      const nodeEl = t.closest('.node');
      if (pin && nodeEl) {
        const to = +nodeEl.querySelector('.port-in').dataset.to;
        if (to !== conn.from) {
          applyWire(conn, to);
          toast('已连接 → [' + to + ']');
        }
      } else {
        const near = findNearestInputPort(e.clientX, e.clientY, 56);
        if (near >= 0 && near !== conn.from) {
          applyWire(conn, near);
          toast('已吸附连接到 [' + near + ']');
        } else {
          const saved = { from: conn.from, kind: conn.kind, ci: conn.ci };
          state.connect = null;
          openConnectTargetModal(saved, e.clientX, e.clientY);
          renderAll();
          return;
        }
      }
      state.connect = null;
      renderAll();
      return;
    }
  });

  wrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    const z = e.deltaY > 0 ? -0.08 : 0.08;
    state.zoom = Math.min(2.2, Math.max(0.35, state.zoom + z));
    updateTransform();
    drawEdges(null);
  }, { passive: false });

  $('dlgName').oninput = () => { state.name = $('dlgName').value; persist(); };

  $('btnNew').onclick = () => {
    if (!confirm('新建将清空当前内容（已自动缓存到浏览器）')) return;
    state.name = 'NewDialogue';
    state.nodes = [];
    ensureFirstNode();
    resetUndoStack();
    persist();
    renderAll();
    toast('已新建（含首个台词节点）');
  };

  $('modalCancel').onclick = () => {
    closeConnectModal();
    renderAll();
  };
  $('modalBg').addEventListener('click', (ev) => {
    if (ev.target.id === 'modalBg') {
      closeConnectModal();
      renderAll();
    }
  });
  $('modalBox').addEventListener('click', (ev) => ev.stopPropagation());

  $('btnAddLine').onclick = () => addLine();
  $('btnAddChoice').onclick = () => addChoice();
  $('btnDel').onclick = deleteSel;
  $('btnLayout').onclick = autoLayout;

  $('btnUndo').onclick = undo;

  $('btnVal').onclick = () => {
    const bad = validate();
    if (bad.length) alert('问题：\n' + bad.join('\n'));
    else toast('校验通过');
  };

  $('btnCopy').onclick = async () => {
    const bad = validate();
    if (bad.length) { if (!confirm('当前图有校验问题，仍复制？')) return; }
    const txt = JSON.stringify(toUnityJson(), null, 2);
    try {
      await navigator.clipboard.writeText(txt);
      toast('已复制到剪贴板');
    } catch {
      toast('复制失败', true);
    }
  };

  $('btnOpen').onclick = () => $('fileIn').click();
  $('fileIn').onchange = async (e) => {
    const f = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!f) return;
    try {
      const txt = await f.text();
      fromUnityJson(JSON.parse(txt));
      if (!state.nodes.length) ensureFirstNode();
      else ensureAtLeastOneLineNode();
      state.sel = state.nodes.length ? 0 : -1;
      state.fileHandle = null;
      resetUndoStack();
      persist();
      renderAll();
      toast('已打开 ' + f.name);
    } catch (err) {
      toast('打开失败: ' + err.message, true);
    }
  };

  $('btnSave').onclick = async () => {
    const bad = validate();
    if (bad.length) { if (!confirm('校验未通过，仍保存？\n' + bad.slice(0, 5).join('\n'))) return; }
    const txt = JSON.stringify(toUnityJson(), null, 2);
    if (window.showSaveFilePicker) {
      try {
        const h = await window.showSaveFilePicker({
          suggestedName: (state.name || 'dialogue') + '.json',
          types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
        });
        const w = await h.createWritable();
        await w.write(txt);
        await w.close();
        state.fileHandle = h;
        toast('已保存');
        return;
      } catch (e) {
        if (e.name === 'AbortError') return;
      }
    }
    const blob = new Blob([txt], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (state.name || 'dialogue') + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('已下载');
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && $('modalBg').classList.contains('on')) {
      closeConnectModal();
      renderAll();
      return;
    }
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    if (e.key === 'Delete' || e.key === 'Backspace') deleteSel();
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  });

  /** init */
  (function init() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) applySnapshot(raw);
      else {
        state.name = 'NewDialogue';
        state.nodes = [];
      }
    } catch {
      state.name = 'NewDialogue';
      state.nodes = [];
    }
    if (!state.nodes.length) ensureFirstNode();
    else ensureAtLeastOneLineNode();
    state.sel = state.nodes.length ? 0 : -1;
    resetUndoStack();
    renderAll();
  })();
})();
  </script>
</body>
</html>
